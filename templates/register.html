{% extends "base.html" %}

{% block content %}

<h2>Create Account</h2>

<form method="POST">

<input
class="form-control mb-3"
name="username"
placeholder="Username"
required>

<input
class="form-control mb-3"
name="email"
type="email"
placeholder="Email"
required>

<input
type="password"
class="form-control mb-3"
name="password"
placeholder="Password"
required>

<button class="btn btn-primary">

Register

</button>

</form>

{% endblock %}
